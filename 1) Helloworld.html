<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello World</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
  }
  h1 {
    color: #333;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1 id="hello">Hello, World!</h1>

<script>
  document.getElementById("hello").onclick = () => {
    alert("Welcome to your first web page!");
  };
</script>

</body>
</html>
