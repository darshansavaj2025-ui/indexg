<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hello World Fun</title>
<style>
body{
margin:0;height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;
background:url('Swami.png') center/cover no-repeat;font-family:Arial;
transition:background-color .5s;
}
h1{
position:absolute;color:#fff;font-size:4em;
background:rgba(0,0,0,.4);padding:20px 40px;border-radius:20px;
text-shadow:2px 2px 8px #000;
}
button{
position:absolute;top:20px;padding:12px 20px;
font-size:18px;border:none;border-radius:10px;cursor:pointer;
}
.balloon{
position:absolute;bottom:-100px;font-size:40px;
animation:float linear infinite;
}
@keyframes float{to{transform:translateY(-120vh) rotate(360deg);}}
</style>
</head>
<body>

<button onclick="changeBg()">Change Background</button>
<h1 id="hello">Hello World 🎈</h1>

<script>
for(let i=0;i<20;i++){
let b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";
b.style.left=Math.random()*100+"vw";
b.style.animationDuration=5+Math.random()*5+"s";
document.body.appendChild(b);
}

function changeBg(){
document.body.style.backgroundColor=
`hsl(${Math.random()*360},70%,60%)`;
}

let x=100,y=100,dx=3,dy=2,h=document.getElementById("hello");
setInterval(()=>{
x+=dx;y+=dy;
if(x<0||x>window.innerWidth-h.offsetWidth)dx=-dx;
if(y<0||y>window.innerHeight-h.offsetHeight)dy=-dy;
h.style.left=x+"px";h.style.top=y+"px";
},20);
</script>
</body>
</html>
